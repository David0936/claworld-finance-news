name: Fetch X tweets

on:
  schedule:
    # 每小时整点抓一次（UTC）。想改频率改这里的 cron。
    - cron: "0 * * * *"
  workflow_dispatch: # 也可在 Actions 页面手动点 Run
  push:
    branches: [main]
    paths:
      - ".github/workflows/fetch.yml"
      - "scripts/fetch-x.mjs"
      - "scripts/handles.json"

permissions:
  contents: write

concurrency:
  group: fetch-x
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest tweets
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          # 如需换服务商/端点，在仓库 Variables 里设这几个即可（可留空用默认）
          TWITTER_API_BASE: ${{ vars.TWITTER_API_BASE }}
          TWITTER_API_PATH: ${{ vars.TWITTER_API_PATH }}
          TWITTER_API_KEY_HEADER: ${{ vars.TWITTER_API_KEY_HEADER }}
          TWITTER_API_METHOD: ${{ vars.TWITTER_API_METHOD }}
          TWITTER_API_USER_PARAM: ${{ vars.TWITTER_API_USER_PARAM }}
          TWITTER_API_TOKEN_QUERY: ${{ vars.TWITTER_API_TOKEN_QUERY }}
          TWITTER_API_BODY: ${{ vars.TWITTER_API_BODY }}
          # 没有 TWITTER_API_KEY 时，脚本会尝试公开镜像源；设 none 可禁用。
          TWITTER_PUBLIC_SOURCE: ${{ vars.TWITTER_PUBLIC_SOURCE }}
          SOTWE_BASE: ${{ vars.SOTWE_BASE }}
          MAX_TWEETS: ${{ vars.MAX_TWEETS }}
        run: node scripts/fetch-x.mjs

      - name: Push digest to IM (Feishu / Telegram)
        # 把新推文整理成卡片推到飞书/Telegram。下面任一渠道留空即自动跳过，不会报错。
        # 到 Settings → Secrets and variables → Actions 里按需添加这些 Secret。
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 完整看板地址（= 主站 FFC_LINKS.tweetsBoard），可放 Secret 或 Variable
          SITE_URL: ${{ vars.SITE_URL }}
        run: node scripts/push-im.mjs

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/live)" ]; then
            git add data/live
            git commit -m "chore: 自动更新博主推文 ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
            echo "已提交更新，将触发部署。"
          else
            echo "无变化，跳过。"
          fi
